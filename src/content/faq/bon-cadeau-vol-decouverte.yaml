question: Peut-on offrir un vol découverte en cadeau ?
answer: >-
  Oui, nous proposons des bons cadeaux. Vous pouvez les obtenir lors de notre permanence ou 
  en nous contactant par email. Le bon est valable 12 mois et peut
  être utilisé à la date qui convient au bénéficiaire.
page: discovery-flights
order: 2
