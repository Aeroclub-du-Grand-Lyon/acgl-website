question: Combien coûte la formation pilote à l'ACGL ?
answer: >-
  Le coût total dépend de votre nombre d'heures de vol. En comptant le tarif
  horaire de l'avion, l'instruction et les cotisations, un PPL(A) se situe
  généralement entre 8 000 et 12 000 €. Pour un LAPL(A), comptez entre 5 500
  et 8 000 €.
