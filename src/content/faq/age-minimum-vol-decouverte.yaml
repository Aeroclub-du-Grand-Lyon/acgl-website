question: Quel âge minimum pour un vol découverte ?
answer: >-
  Il n'y a pas d'âge minimum officiel pour monter à bord en passager. En
  pratique, nous accueillons des enfants dès 8-10 ans accompagnés d'un parent.
  Pour tenir les commandes lors d'un vol d'initiation, nous recommandons 14 ans
  minimum.
