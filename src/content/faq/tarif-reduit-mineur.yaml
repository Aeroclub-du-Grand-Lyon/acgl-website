question: Peut-on bénéficier d'un tarif réduit avant la majorité ?
answer: >-
  La cotisation club est réduite à 120 € (contre 240 €) pour les membres de
  moins de 25 ans. Les tarifs horaires avion restent identiques, avec le même
  mécanisme de tarif réduit via la participation aux frais fixes.
page: pricing
order: 6
