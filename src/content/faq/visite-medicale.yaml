question: Faut-il une visite médicale pour passer la licence ?
answer: >-
  Oui. Pour le PPL(A) ou LAPL(A), une visite médicale de classe 2 est requise.
  Elle peut être réalisée auprès d'un médecin aéronautique (AeMC) ou, pour le
  LAPL, auprès d'un médecin agréé. La visite se fait idéalement avant le début
  de la formation.
