question: L'ACGL propose-t-il des cours théoriques ?
answer: >-
  Votre instructeur vous prépare à l'examen théorique (9 matières pour le PPL)
  lors des briefings sol. Des supports pédagogiques approuvés par la DGAC sont
  mis à disposition. L'examen théorique se passe dans un centre agréé.
page: flight-school
order: 4
