question: Combien d'heures faut-il pour obtenir le PPL(A) ?
answer: >-
  La réglementation européenne impose un minimum de 45 heures de vol pour le
  PPL(A), dont au moins 25 heures en double commande et 10 heures en solo. Dans
  la pratique, la majorité des élèves obtiennent leur licence entre 55 et 70
  heures.
