question: Combien de personnes peuvent monter en avion ?
answer: >-
  Selon l'avion choisi, un vol découverte peut accueillir jusqu'à 3 passagers
  en plus de l'instructeur - ou 1 passager sur les avions biplace. Précisez
  votre demande lors de la réservation pour que nous adaptions l'avion.
page: discovery-flights
order: 3
