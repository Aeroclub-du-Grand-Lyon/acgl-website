question: Peut-on commencer à piloter sans expérience ?
answer: >-
  Oui, aucune expérience n'est requise. La formation débute par un vol de
  découverte, puis progresse selon votre rythme. L'âge minimum pour le premier
  vol solo est de 16 ans, la délivrance de la licence intervenant à partir de
  17 ans.
