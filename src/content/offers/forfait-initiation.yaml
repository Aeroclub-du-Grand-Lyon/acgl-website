title: Forfait initiation
icon: runway
tagline: 3 vols pour décider en connaissance de cause
description: >-
  Le forfait initiation comprend 3 vols d'initiation progressifs avec le même
  instructeur. À l'issue, vous avez toutes les cartes en main pour choisir de
  poursuivre vers la licence ou simplement de répéter l'expérience.
duration: 3 × 45 min de vol
price: À partir de 700 €
capacity: 1 pilote stagiaire
notes: >-
  Le montant comprend la licence FFA, 3 séances de vol, un carnet de vol. Une
  réduction de 50€ sera appliqué sur votre cotisation si vous poussuivez votre
  formation à l'aéroclub.
order: 3
