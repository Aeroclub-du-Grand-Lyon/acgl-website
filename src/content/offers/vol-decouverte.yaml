title: Vol de découverte
icon: plane-ticket
tagline: Découvrir les sensations du vol en avion
description: >-
  Autre fois appelé baptême de l'air, le vol découverte vous permet d'effectuer
  un premier vol en avion léger. Sa durée de 30 min, contrainte réglementaire,
  vous permet de vivre les sensations du vol au tour de l'aéroport de Lyon Bron.
duration: 30 min de vol
price: À partir de 170 €
capacity: 1 à 3 passagers en fonction de l'avion
notes: Aucune condition physique particulière. Bon cadeau disponible sur demande.
order: 1
