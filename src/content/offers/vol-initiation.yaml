title: Vol d'initiation au pilotage
icon: headset
tagline: Vous aux commandes pendant toute la durée du vol
description: >-
  Votre première expérience de pilotage aux côté d'un de nos instructeurs.
  Décollage, montée, descentes, virages, atterrissage : une immersion complète
  pour ceux qui veulent vraiment "sentir" l'avion avant de s'engager dans la
  formation.
duration: 45 min de vol + briefing au sol
price: À partir de 240 €
capacity: 1 pilote stagiaire + 1 passager maximum
notes: >-
  Idéal avant de démarrer une formation PPL ou LAPL. Ce vol peut être intégré au
  cursus de formation et compté dans le carnet de vol.
order: 2
