items:
  - title: HandiBron
    description: >-
      Présents tous les ans au Forum des associations de Bron, ceci nous permet
      d'offrir 2 vols découvertes pour des enfants porteurs de handicap en
      association avec HandiBron.
  - title: Ailes du Petit Prince
    description: >-
      L'ACGL engagé au sein des Ailes du Petit Prince, permet d'effectuer des
      vols découverte avec des enfants porteurs de handicap, et ce, pour la
      première fois, en avion électrique.
