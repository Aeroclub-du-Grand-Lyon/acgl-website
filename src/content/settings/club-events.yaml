items:
  - title: Galette des rois
    icon: gift
    description: >-
      Tradition incontournable pour bien démarrer la saison, le club se réunit
      pour un moment convivial autour d'une galette des rois.
  - title: Sorties club
    icon: compass
    description: >-
      Voyage en Corse ou en Europe, une balade de nuit ou déjeuner, le club
      organise des vols en groupe, ouvertes à tous et toutes.
  - title: Barbecue de rentrée
    icon: users
    description: >-
      Le club rouvre ses ailes après l'été autour d'un barbecue convivial. Le
      moment idéal pour accueillir les nouveaux membres de la saison.
