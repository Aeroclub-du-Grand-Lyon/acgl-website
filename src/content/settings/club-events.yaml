items:
  - title: Galette des rois
    icon: gift
    description: >-
      Tradition incontournable pour bien démarrer la saison : le club se réunit
      en début d'année autour de la galette des rois.
  - title: Sorties club
    icon: compass
    description: >-
      Tout au long de l’année des sorties en groupe et ouvert à tous, allant
      d’un voyage de trois jours en Corse à un voyage de nuit en France, en
      passant par une balade en Suisse ou en Italie, ou encore un déjeuner à
      Aubenas, Aurillac ou Arcachon.
  - title: Barbecue de rentrée
    icon: users
    description: >-
      Le club rouvre ses ailes après l'été autour d'un barbecue convivial. Le
      moment idéal pour accueillir les nouveaux membres de la saison.
